services:
  bbm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbm-api
    ports:
      - "${API_PORT:-5010}:5010"
    environment:
      - NODE_ENV=production
      - PORT=5010
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5010/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - bbm-network
      - cloudflare-tunnel

networks:
  bbm-network:
    driver: bridge
  cloudflare-tunnel:
    external: true
